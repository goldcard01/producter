<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 50px; background: #f0f2f5; text-align: center; }
        form { background: white; padding: 30px; border-radius: 15px; display: inline-block; width: 300px; }
        input, textarea { width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>제휴 문의</h1>
    <!-- Formspree ID를 아래 action URL의 YOUR_FORM_ID 부분에 입력하세요 -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <input type="text" name="name" placeholder="이름" required>
        <input type="email" name="email" placeholder="이메일" required>
        <textarea name="message" placeholder="문의 내용" required></textarea>
        <button type="submit">전송</button>
    </form>
</body>
</html>
